<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="telegram-ipv6-doctor — one command tells you whether it is your network, your firewall, or Telegram">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AABEE"/>
      <stop offset="1" stop-color="#229ED9"/>
    </linearGradient>
    <style>
      .t { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .title { font: 700 27px ui-sans-serif, -apple-system, "Segoe UI", sans-serif; fill: #e8eef7; }
      .sub   { font: 400 13.5px ui-sans-serif, -apple-system, sans-serif; fill: #93a1b5; }
      .lbl   { font: 700 11px ui-monospace, monospace; }
      .v4 { fill: #2fd08a } .v6 { fill: #f0a83c } .flt { fill: #ff5d5d }
      @media (prefers-color-scheme: light) {
        .title { fill: #0d1220 } .sub { fill: #5b6b82 }
        .bg { fill: #f5f8fc } .card { fill: #ffffff; stroke: #dbe3ee }
      }
    </style>
  </defs>

  <rect class="bg" width="640" height="200" rx="16" fill="#0b1017"/>

  <!-- mark: two paths, one clean, one broken -->
  <g transform="translate(34,44)">
    <circle cx="18" cy="56" r="13" fill="url(#tg)"/>
    <path d="M12 56 l4 4 l8 -9" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- clean v4 trace -->
    <path d="M36 44 C 70 40, 96 42, 128 41" stroke="#2fd08a" stroke-width="2.4" fill="none"/>
    <!-- broken v6 trace -->
    <path d="M36 70 C 56 54, 62 86, 82 62 S 106 88, 128 66" stroke="#f0a83c" stroke-width="2.4" fill="none" stroke-dasharray="6 4"/>
    <text class="t lbl v4" x="138" y="45">IPv4</text>
    <text class="t lbl v6" x="138" y="70">IPv6</text>
  </g>

  <text class="title" x="212" y="76">telegram-ipv6-doctor</text>
  <text class="sub"   x="212" y="101">Telegram stuck on “Connecting”? One command tells you why.</text>

  <!-- three causes -->
  <g transform="translate(212,120)">
    <rect class="card" width="124" height="30" rx="8" fill="#141c28" stroke="#243044"/>
    <text class="t lbl v6" x="14" y="20">your network</text>
    <rect class="card" x="134" width="124" height="30" rx="8" fill="#141c28" stroke="#243044"/>
    <text class="t lbl flt" x="148" y="20">your firewall</text>
    <rect class="card" x="268" width="124" height="30" rx="8" fill="#141c28" stroke="#243044"/>
    <text class="t lbl" x="282" y="20" fill="#2AABEE">Telegram</text>
  </g>

  <text class="sub" x="212" y="172" font-size="12" fill="#6f8098">read-only by default · zero dependencies · reversible fix</text>
</svg>
